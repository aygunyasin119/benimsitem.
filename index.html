<!DOCTYPE html>
<html lang="tr">
<head>
<meta charset="UTF-8">
<title>FINAL BOSS SITE</title>

<style>
body{
  margin:0;
  font-family:Arial;
  transition:0.3s;
  scroll-behavior:smooth;
}

.light{background:#f4f4f4;color:#000;}
.dark{background:#121212;color:#fff;}

nav{
  position:fixed;
  top:0;
  width:100%;
  background:#111;
  display:flex;
  justify-content:center;
}

nav a{
  color:white;
  padding:15px;
  text-decoration:none;
}
nav a:hover{background:#1abc9c;}

header{
  height:100vh;
  display:flex;
  flex-direction:column;
  justify-content:center;
  align-items:center;
  background:linear-gradient(120deg,#3498db,#8e44ad);
  color:white;
}

section{
  width:80%;
  margin:80px auto;
}

.card{
  background:white;
  padding:20px;
  margin:15px 0;
  border-radius:10px;
  box-shadow:0 3px 10px rgba(0,0,0,0.2);
}

.dark .card{background:#1e1e1e;}

button{
  padding:10px;
  border:none;
  background:#3498db;
  color:white;
  cursor:pointer;
  border-radius:5px;
}

button:hover{background:#1abc9c;}

.popup{
  display:none;
  position:fixed;
  width:100%;
  height:100%;
  background:rgba(0,0,0,0.6);
}

.popup-content{
  background:white;
  width:300px;
  margin:15% auto;
  padding:20px;
  text-align:center;
  border-radius:10px;
}

input{
  padding:10px;
  margin:5px;
  width:80%;
}
</style>
</head>

<body class="light">

<nav>
  <a href="#home">Ana</a>
  <a href="#game">Oyun</a>
  <a href="#quiz">Quiz</a>
  <a href="#contact">İletişim</a>
</nav>

<header id="home">
  <h1>🔥 FINAL BOSS SITE</h1>
  <p id="typing"></p>

  <button onclick="mode()">🌙 Mod</button>
</header>

<section id="game">
  <h2>🎮 Mini Oyun</h2>
  <div class="card">
    <p>0–10 arası sayı tahmin et:</p>
    <input id="guess">
    <button onclick="game()">Tahmin Et</button>
    <p id="gameResult"></p>
  </div>
</section>

<section id="quiz">
  <h2>🧠 Quiz</h2>
  <div class="card">
    <p>HTML ne demek?</p>
    <button onclick="q(1)">Doğru</button>
    <button onclick="q(0)">Yanlış</button>
    <p id="score">Skor: 0</p>
  </div>
</section>

<section id="contact">
  <h2>📧 İletişim</h2>
  <div class="card">
    <input id="name" placeholder="Ad">
    <input id="mail" placeholder="E-posta">
    <button onclick="send()">Gönder</button>
  </div>
</section>

<!-- POPUP -->
<div class="popup" id="popup">
  <div class="popup-content">
    <h3>✔ Gönderildi</h3>
    <button onclick="closeP()">OK</button>
  </div>
</div>

<script>

let t="Bu site FINAL BOSS seviyesidir 😎";
let i=0;

function type(){
  if(i<t.length){
    document.getElementById("typing").innerHTML+=t[i];
    i++;
    setTimeout(type,50);
  }
}
type();

// DARK MODE
function mode(){
  document.body.classList.toggle("dark");
  document.body.classList.toggle("light");
}

// OYUN
let rnd = Math.floor(Math.random()*10);

function game(){
  let g=document.getElementById("guess").value;

  if(g==rnd){
    document.getElementById("gameResult").innerText="Doğru bildin 🎉";
  }else{
    document.getElementById("gameResult").innerText="Yanlış 😅 sayı: "+rnd;
  }
  rnd=Math.floor(Math.random()*10);
}

// QUIZ
let score=0;

function q(a){
  if(a==1) score++;
  document.getElementById("score").innerText="Skor: "+score;
}

// FORM
function send(){
  document.getElementById("popup").style.display="block";
}

function closeP(){
  document.getElementById("popup").style.display="none";
}

</script>

</body>
</html>

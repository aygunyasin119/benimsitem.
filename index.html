<!DOCTYPE html>
<html lang="tr">
<head>
<meta charset="UTF-8">
<title>V10 ULTRA PLATFORM</title>

<style>
body{margin:0;font-family:Arial;background:#f4f4f4;}
.dark{background:#1e1e1e;color:white;}

.menu{position:fixed;width:200px;height:100vh;background:#111;padding:10px;}
.menu button{width:100%;padding:10px;color:white;background:none;border:none;cursor:pointer;}
.menu button:hover{background:#1abc9c;}

.content{margin-left:210px;padding:20px;}
.card{background:white;padding:10px;margin:10px;border-radius:10px;}
.dark .card{background:#333;}

input,button{padding:10px;margin:5px;width:100%;}
</style>
</head>

<body>

<!-- MENU -->
<div class="menu">
  <button onclick="show('games')">🎮 Oyunlar</button>
  <button onclick="show('boss')">🧟 Boss</button>
  <button onclick="show('bot')">🤖 Bot</button>
  <button onclick="show('stats')">📊 Analiz</button>
  <button onclick="theme()">🌙 Tema</button>
</div>

<div class="content">

<!-- GAMES -->
<div id="games">
  <h1>🎮 Oyunlar</h1>

  <button onclick="aimGame()">🎯 Aim</button>
  <button onclick="typingGame()">⌨️ Typing</button>
  <button onclick="rps()">🪨 RPS</button>

  <p id="gameRes"></p>
</div>

<!-- BOSS -->
<div id="boss" style="display:none">
  <h1>🧟 Boss Fight</h1>

  <p>Boss HP: <span id="hp">100</span></p>
  <button onclick="hitBoss()">Vur</button>
</div>

<!-- BOT -->
<div id="bot" style="display:none">
  <h1>🤖 Bot</h1>

  <input id="cmd">
  <button onclick="runBot()">Gönder</button>
  <p id="botRes"></p>
</div>

<!-- STATS -->
<div id="stats" style="display:none">
  <h1>📊 Analiz</h1>
  <button onclick="showStats()">Göster</button>
</div>

</div>

<script>

let score=0;
let bossHP=100;
let games=0;
let messages=0;

/* NAV */
function show(id){
  ["games","boss","bot","stats"].forEach(x=>{
    document.getElementById(x).style.display="none";
  });
  document.getElementById(id).style.display="block";
}

/* AIM GAME */
function aimGame(){
  games++;
  if(Math.random()>0.6){
    score+=10;
    notify("🎯 +10");
  }
}

/* TYPING GAME */
function typingGame(){
  games++;
  let word="kod";
  let input=prompt("Yaz: "+word);
  if(input==word){
    score+=10;
    notify("⌨️ +10");
  }
}

/* RPS */
function rps(){
  games++;
  let a=["taş","kağıt","makas"][Math.floor(Math.random()*3)];
  alert("Bot: "+a);
}

/* BOSS */
function hitBoss(){
  bossHP-=10;
  document.getElementById("hp").innerText=bossHP;

  if(bossHP<=0){
    score+=50;
    notify("🔥 Boss öldü +50");
    bossHP=100;
    document.getElementById("hp").innerText=100;
  }
}

/* BOT */
function runBot(){
  messages++;
  let c=document.getElementById("cmd").value;

  if(c=="/score") document.getElementById("botRes").innerText=score;
  else if(c=="/time") document.getElementById("botRes").innerText=new Date().toLocaleTimeString();
  else document.getElementById("botRes").innerText="Anlamadım";
}

/* STATS */
function showStats(){
  alert(
    "🎮 Oyun: "+games+
    "\n💬 Mesaj: "+messages+
    "\n🏆 Puan: "+score
  );
}

/* NOTIFY */
function notify(t){
  let d=document.createElement("div");
  d.innerText=t;
  d.style.position="fixed";
  d.style.bottom="10px";
  d.style.right="10px";
  d.style.background="#1abc9c";
  d.style.color="white";
  d.style.padding="10px";
  document.body.appendChild(d);
  setTimeout(()=>d.remove(),2000);
}

/* THEME */
function theme(){
  document.body.classList.toggle("dark");
}

</script>

</body>
</html>

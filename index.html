<!DOCTYPE html>
<html lang="tr">
<head>
<meta charset="UTF-8">
<title>ULTRA PLATFORM V12</title>

<style>
body{margin:0;font-family:Arial;transition:0.3s;}
.light{background:#f4f4f4;color:#000;}
.dark{background:#1e1e1e;color:#fff;}

.menu{
  position:fixed;width:200px;height:100vh;
  background:#111;padding-top:20px;
}
.menu button{
  width:100%;padding:10px;background:none;
  color:white;border:none;cursor:pointer;
}
.menu button:hover{background:#1abc9c;}

.content{margin-left:210px;padding:20px;}

.card{
  background:#fff;padding:15px;margin:10px 0;
  border-radius:10px;
}
.dark .card{background:#333;color:white;}

input,button{padding:10px;margin:5px;width:100%;}
img{max-width:200px;border-radius:10px;}
</style>
</head>

<body class="light">

<!-- LOGIN -->
<div id="login" style="position:fixed;width:100%;height:100%;background:#000;color:white;display:flex;flex-direction:column;justify-content:center;align-items:center;">
  <h1>🔐 Giriş</h1>
  <input id="user" placeholder="Kullanıcı adı">
  <input id="pass" placeholder="Şifre">
  <button onclick="login()">Giriş</button>
</div>

<!-- MENU -->
<div class="menu">
  <button onclick="show('feed')">📱 Feed</button>
  <button onclick="show('games')">🎮 Oyunlar</button>
  <button onclick="show('chat')">💬 Chat</button>
  <button onclick="show('boss')">🧟 Boss</button>
  <button onclick="show('music')">🎧 Müzik</button>
  <button onclick="show('gallery')">🖼️ Galeri</button>
  <button onclick="show('profile')">👤 Profil</button>
  <button onclick="show('inspire')">⭐ İlham</button>
  <button onclick="theme()">🌙 Tema</button>
</div>

<div class="content">

<!-- FEED -->
<div id="feed">
  <h1>📱 Feed</h1>
  <input id="post"><button onclick="addPost()">Paylaş</button>
  <div id="posts"></div>
</div>

<!-- GAMES -->
<div id="games" style="display:none">
  <h1>🎮 Oyunlar</h1>

  <button onclick="guess()">Sayı Tahmin</button>
  <button onclick="reflex()">Refleks</button>
  <button onclick="luck()">Şans</button>
  <button onclick="typing()">Hızlı Yaz</button>
  <button onclick="coin()">Para At</button>

  <p id="g1"></p>
</div>

<!-- CHAT -->
<div id="chat" style="display:none">
  <h1>💬 Chat</h1>
  <input id="msg"><button onclick="send()">Gönder</button>
  <div id="chatBox"></div>
</div>

<!-- BOSS -->
<div id="boss" style="display:none">
  <h1>🧟 Boss</h1>
  <p>HP: <span id="hp">100</span></p>
  <button onclick="hitBoss()">Vur</button>
</div>

<!-- MUSIC -->
<div id="music" style="display:none">
  <h1>🎧 Müzik</h1>
  <audio controls>
    <source src="https://www.soundhelix.com/examples/mp3/SoundHelix-Song-1.mp3">
  </audio>
</div>

<!-- GALLERY -->
<div id="gallery" style="display:none">
  <h1>🖼️ Galeri</h1>
  <img src="https://picsum.photos/200/150">
  <img src="https://picsum.photos/201/150">
</div>

<!-- PROFILE -->
<div id="profile" style="display:none">
  <h1>👤 Profil</h1>

  <div class="card">
    <h2>Yasin</h2>
    <p>📧 aygunyasin123.@gmail.com</p>
    <p>🎓 Öğrenci</p>
    <p>🏆 Skor: <span id="score">0</span></p>
  </div>
</div>

<!-- INSPIRATION -->
<div id="inspire" style="display:none">
  <h1>⭐ İlham Aldığım Kişiler</h1>

  <div class="card">
    <h3>David Goggins</h3>
    <p>Disiplin ve mental güç örneği</p>
    <img src="https://upload.wikimedia.org/wikipedia/commons/3/3e/David_Goggins_2018.jpg">
  </div>

  <div class="card">
    <h3>Elon Musk</h3>
    <p>Teknoloji ve inovasyon</p>
  </div>

  <div class="card">
    <h3>Steve Jobs</h3>
    <p>Basit ama güçlü tasarım</p>
  </div>
</div>

</div>

<script>

let score=0;
let hp=100;

/* LOGIN */
function login(){
  let u=document.getElementById("user").value;
  let p=document.getElementById("pass").value;

  if(u=="Yasin" && p=="3169"){
    document.getElementById("login").style.display="none";
  }else{
    alert("Hatalı giriş");
  }
}

/* NAV */
function show(id){
  ["feed","games","chat","boss","music","gallery","profile","inspire"]
  .forEach(x=>document.getElementById(x).style.display="none");
  document.getElementById(id).style.display="block";
}

/* FEED */
function addPost(){
  document.getElementById("posts").innerHTML+=
  "<div class='card'>"+document.getElementById("post").value+"</div>";
}

/* GAMES */
function guess(){if(Math.random()>0.5){score+=10;update();}}
function reflex(){score+=5;update();}
function luck(){if(Math.random()>0.5){score+=10;update();}}

function typing(){
  let w="kod";
  let x=prompt("Yaz: "+w);
  if(x==w){score+=10;update();}
}

function coin(){
  let r=Math.random();
  alert(r>0.5?"Yazı":"Tura");
}

/* BOSS */
function hitBoss(){
  hp-=10;
  if(hp<=0){score+=50;hp=100;}
  update();
}

/* CHAT */
function send(){
  document.getElementById("chatBox").innerHTML+=
  "<div class='card'>"+document.getElementById("msg").value+"</div>";
}

/* SCORE */
function update(){
  document.getElementById("score").innerText=score;
}

/* THEME */
function theme(){
  document.body.classList.toggle("dark");
}

</script>

</body>
</html>

<!DOCTYPE html>
<html lang="tr">
<head>
<meta charset="UTF-8">
<title>PRO MAX WEB APP</title>

<style>
body{
  margin:0;
  font-family:Arial;
  transition:0.3s;
}

/* THEMES */
.light{background:#f4f4f4;color:#000;}
.dark{background:#1e1e1e;color:#fff;}

/* SIDEBAR */
.sidebar{
  position:fixed;
  width:220px;
  height:100vh;
  background:#111;
  padding-top:20px;
}

.sidebar button{
  width:100%;
  padding:10px;
  background:none;
  color:white;
  border:none;
  cursor:pointer;
}

.sidebar button:hover{
  background:#1abc9c;
}

/* CONTENT */
.content{
  margin-left:230px;
  padding:20px;
}

/* CARD */
.card{
  background:#fff;
  padding:15px;
  margin:10px 0;
  border-radius:10px;
}

.dark .card{background:#333;color:white;}

/* INPUT */
input{
  padding:10px;
  margin:5px;
}

/* TOAST */
.toast{
  position:fixed;
  bottom:20px;
  right:20px;
  background:#000;
  color:#fff;
  padding:10px;
  display:none;
}
</style>
</head>

<body class="light">

<div class="sidebar">
  <button onclick="show('home')">🏠 Dashboard</button>
  <button onclick="show('game')">🎮 Oyun</button>
  <button onclick="show('quiz')">🧠 Quiz</button>
  <button onclick="show('tools')">🧰 Araçlar</button>
  <button onclick="show('stats')">📊 İstatistik</button>
  <button onclick="show('robot')">🤖 Robot</button>
  <button onclick="theme()">🌙 Tema</button>
</div>

<div class="content">

<!-- DASHBOARD -->
<div id="home">
  <h1>📊 DASHBOARD</h1>
  <div class="card">👤 Kullanıcı: Admin</div>
  <div class="card">🎯 Skor: <span id="score">0</span></div>
</div>

<!-- GAME -->
<div id="game" style="display:none">
  <h1>🎮 Oyun</h1>
  <div class="card">
    <input id="g">
    <button onclick="game()">Tahmin</button>
    <p id="r"></p>
  </div>
</div>

<!-- QUIZ -->
<div id="quiz" style="display:none">
  <h1>🧠 Quiz</h1>
  <div class="card">
    HTML nedir?<br>
    <button onclick="q(1)">Dil</button>
    <button onclick="q(0)">Oyun</button>
  </div>
</div>

<!-- TOOLS -->
<div id="tools" style="display:none">
  <h1>🧰 Araçlar</h1>

  <div class="card">
    🎲 Zar
    <button onclick="dice()">At</button>
    <p id="dice_r"></p>
  </div>

  <div class="card">
    ⏱ Sayaç
    <button onclick="start()">Başlat</button>
    <p id="t">0</p>
  </div>

  <div class="card">
    🔐 Şifre
    <button onclick="gen()">Üret</button>
    <p id="p"></p>
  </div>

  <div class="card">
    📝 Not
    <input id="n">
    <button onclick="add()">Ekle</button>
    <ul id="list"></ul>
  </div>
</div>

<!-- STATS -->
<div id="stats" style="display:none">
  <h1>📊 İSTATİSTİK</h1>
  <div class="card">
    Oyun sayısı: <span id="games">0</span><br>
    Not sayısı: <span id="notes">0</span>
  </div>
</div>

<!-- ROBOT -->
<div id="robot" style="display:none">
  <h1>🤖 Robot</h1>
  <div class="card">
    <input id="msg">
    <button onclick="robot()">Gönder</button>
    <p id="reply"></p>
  </div>
</div>

</div>

<div class="toast" id="toast"></div>

<script>

let score = localStorage.getItem("score") || 0;
let games = localStorage.getItem("games") || 0;
let notesCount = localStorage.getItem("notes") || 0;

let num = Math.floor(Math.random()*10);

// NAV
function show(id){
  ["home","game","quiz","tools","stats","robot"].forEach(x=>{
    document.getElementById(x).style.display="none";
  });
  document.getElementById(id).style.display="block";
}

// GAME
function game(){
  let x=document.getElementById("g").value;

  if(x==num){
    score++;
    notify("Doğru 🎉");
  }else{
    notify("Yanlış 😅");
  }

  localStorage.setItem("score",score);
  document.getElementById("score").innerText=score;

  games++;
  localStorage.setItem("games",games);
  document.getElementById("games").innerText=games;

  num=Math.floor(Math.random()*10);
}

// QUIZ
function q(a){
  notify(a==1?"Doğru ✔":"Yanlış ❌");
}

// ZAR
function dice(){
  document.getElementById("dice_r").innerText=
  Math.floor(Math.random()*6)+1;
}

// SAYAÇ
let t=0;
function start(){
  setInterval(()=>{
    t++;
    document.getElementById("t").innerText=t;
  },1000);
}

// ŞİFRE
function gen(){
  document.getElementById("p").innerText=
  Math.random().toString(36).slice(-8);
}

// NOT
function add(){
  let v=document.getElementById("n").value;
  let li=document.createElement("li");
  li.innerText=v;
  document.getElementById("list").appendChild(li);

  notesCount++;
  localStorage.setItem("notes",notesCount);
  document.getElementById("notes").innerText=notesCount;
}

// ROBOT
function robot(){
  let m=document.getElementById("msg").value.toLowerCase();
  let r="";

  if(m.includes("merhaba")) r="Selam 😎";
  else if(m.includes("oyun")) r="Oyun aç 🎮";
  else if(m.includes("saat")) r=new Date().toLocaleTimeString();
  else r="Anlamadım 🤔";

  document.getElementById("reply").innerText=r;
}

// THEME
function theme(){
  document.body.classList.toggle("dark");
  document.body.classList.toggle("light");
}

// NOTIFY
function notify(m){
  let t=document.getElementById("toast");
  t.innerText=m;
  t.style.display="block";
  setTimeout(()=>t.style.display="none",1500);
}

// LOAD
document.getElementById("score").innerText=score;
document.getElementById("games").innerText=games;
document.getElementById("notes").innerText=notesCount;

</script>

</body>
</html>
